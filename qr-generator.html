<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Código QR - Todito Apple</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 24px;
            padding: 40px;
            text-align: center;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .logo {
            width: 60px;
            height: 60px;
            margin-bottom: 20px;
        }
        h1 {
            color: #1d1d1f;
            font-size: 28px;
            margin-bottom: 10px;
            font-weight: 700;
        }
        .url {
            color: #86868b;
            font-size: 14px;
            margin-bottom: 30px;
            word-break: break-all;
        }
        #qrcode {
            display: flex;
            justify-content: center;
            margin: 30px 0;
            padding: 20px;
            background: #f5f5f7;
            border-radius: 16px;
        }
        .instructions {
            color: #1d1d1f;
            font-size: 16px;
            margin-top: 20px;
            line-height: 1.5;
        }
        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 30px;
            background: #0071e3;
            color: white;
            text-decoration: none;
            border-radius: 20px;
            font-weight: 500;
            transition: background 0.3s;
        }
        .btn:hover {
            background: #0077ed;
        }
        .whatsapp-btn {
            display: inline-block;
            margin-top: 15px;
            padding: 12px 30px;
            background: #25D366;
            color: white;
            text-decoration: none;
            border-radius: 20px;
            font-weight: 500;
            transition: background 0.3s;
        }
        .whatsapp-btn:hover {
            background: #128C7E;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="logo.png" alt="Todito Apple" class="logo">
        <h1>Todito Apple</h1>
        <p class="url">https://panterin17-wq.github.io/todito-apple-landing</p>

        <div id="qrcode"></div>

        <p class="instructions">
            📱 Escanea este código QR para visitar nuestra tienda<br>
            💾 Guarda la imagen para compartir en redes sociales
        </p>

        <a href="https://panterin17-wq.github.io/todito-apple-landing" class="btn" target="_blank">Visitar Página</a>
        <br>
        <a href="https://wa.me/522941131400" class="whatsapp-btn" target="_blank">💬 WhatsApp: 2941 131400</a>
    </div>

    <script>
        // Generar el código QR
        new QRCode(document.getElementById("qrcode"), {
            text: "https://panterin17-wq.github.io/todito-apple-landing",
            width: 256,
            height: 256,
            colorDark: "#1d1d1f",
            colorLight: "#ffffff",
            correctLevel: QRCode.CorrectLevel.H
        });
    </script>
</body>
</html>
